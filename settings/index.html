<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="light dark" />

  <script
    type="text/javascript"
    src="/homey.js"
    data-origin="settings">
  </script>

  <style>
    :root {
      color-scheme: light dark;

      --bg: #ffffff;
      --fg: #1f1f1f;
      --muted: #666666;
      --border: #d0d0d0;
      --card: #f5f5f5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111116;
        --fg: #f2f2f2;
        --muted: #aaaaaa;
        --border: #33333a;
        --card: #1d1d25;
      }
    }

    body {
      margin: 0;
      padding: 20px;

      background: var(--bg);
      color: var(--fg);

      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    fieldset {
      border: 1px solid var(--border);
      border-radius: 12px;

      background: var(--card);

      padding: 16px;
    }

    legend {
      font-weight: 600;
      padding: 0 8px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 10px;

      font-size: 16px;
    }

    p {
      margin-bottom: 0;

      color: var(--muted);
      line-height: 1.4;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
    }
  </style>
</head>

<body>

  <fieldset>
    <legend data-i18n="settings.debug.title"></legend>

    <label>
      <input id="debug" type="checkbox" />
      <span data-i18n="settings.debug.enable"></span>
    </label>

    <p data-i18n="settings.debug.description"></p>
  </fieldset>

  <script>

    function applyTranslations(Homey) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = Homey.__(el.dataset.i18n);
      });
    }

    function onHomeyReady(Homey) {

      applyTranslations(Homey);

      const debug = document.getElementById('debug');

      Homey.get('debug', function(err, value) {
        debug.checked = value === true;
      });

      debug.addEventListener('change', () => {
        Homey.set('debug', debug.checked);
      });

      Homey.ready();
    }

  </script>

</body>
</html>
